<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎访问企业信息化管理系统</title>
    <link rel="stylesheet" href="css/reset.css"> <!-- 引入reset.css文件重置样式 -->
    <!--页内css样式-->
    <style>
        /*通过标签配置html与body的高度，块元素宽度默认就是父元素的100%宽度*/
        html,body {
            height: 100%;
        }
        /*通过id值配置元素样式*/
        #container {
            height: 100%; /*高度为父容器的高度*/
            background-image: url("images/backgroundlmg.png"); /*设置背景图片*/
            /*以下两行让背景图片平铺整个容器，且图片不会被裁剪*/
            background-size: cover;
            background-repeat: round;
            /*让子元素水平、垂直中对齐*/
            display: flex; /*使用flex布局*/
            flex-direction: row;  /* 子元素水平依次排列，主轴方向为水平方向 */
            justify-content: center; /* 主轴方向，即当前的水平方向居中对齐 */
            align-items: center; /* 交叉轴方向，即当前的垂直方向居中对齐 */
        }
        /*中部登录包裹框的css样式*/
        #loginwrapper {
            width: 850px; /*配置宽度为850像素*/
            height: 470px; /*配置高度为470像素*/
            min-width: 850px;
            background-image: url("images/loginBG.jpg"); /*设置背景图片*/
            /*配置背景图片的渲染整个父容器*/
            background-repeat: round;
            background-size: cover;
            /*配置div的四个角为圆角*/
            border-radius: 10px;
            /*使用flex布局方式*/
            display: flex;
            flex-direction: row-reverse;/*子元素从右向左排列*/
        }
        #loginwindow{
            background-color: #ffffff;  /*背景色为白色*/
            height: 100%; /*占父元素100%的高度*/
            width: 45%; /*占父元素45%的高度*/
            border-radius: 10px; /*设置四角为圆角类型*/
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #logininfo {
            width: 80%;
            height: 70%;
            color: #6c6c6c;
            font-size: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        /* 配置div#logininfo下的直接孩子h1样式,直接孩子用>表示   */
        #logininfo > h1 {
            text-align: center; /*文本中对齐*/
            color: #547BD6; /*字体颜色*/
            margin-bottom: 20px;
        }

        /* 配置div#logininfo下的所有孩子input样式,所有孩子用空格表示   */
        #logininfo input {
            border-bottom: 1px solid #547BD6; /*设置下边框样式*/
            width: 100%; /*宽度占满父容器的所有宽度*/
            letter-spacing: 1px; /*水平字间距1px*/
            margin-top: 4px; /*设置上边距margin为4px*/
        }

        /* 配置div#btn_wrapper下的直接孩子button样式*/
        #btn_wrapper > button {
            height: 40px; /*设置高度为40px*/
            width: 150px; /*设置宽度为15px*/
            background-color: #547BD6; /*配置button按钮背景色*/
            border-radius: 20px; /*配置四角为圆角，度为20px*/
            letter-spacing: 5px; /*设置字间距为5px*/
            font-size: 20px; /*设置字体大小为20px */
            color: #ffffff; /* 设置字体颜色为白色 */
            box-shadow: 0px 15px 25px -5px #000; /* 设置按钮阴影 */
        }

        /* 配置div#btn_wrapper下的直接孩子button中对齐*/
        #btn_wrapper {
            text-align: center; /*让当前容器中的内容中对齐*/
        }

        /* 配置div#btn_wrapper下的直接孩子a中对齐*/
        #a_wrapper {
            text-align: center; /*让当前容器中的内容中对齐*/
            margin-top: -15px; /*配置上方边距*/
        }

        /*配置超链接的样式*/
        /*a:link：连接的平时状态，a:visited被点击过的链接状态，a:active处于被激活的链接状态*/
        a:link, a:visited, a:active {
            color: #547BD6; /*配置链接颜色*/
            text-decoration: none; /*配置无任何装饰效果*/
        }

        /*配置鼠标放到链接上的样式*/
        a:hover {
            color: red; /*配置颜色为红色*/
            text-decoration: underline;  /*配置装饰效果为下划线*/
        }
    </style>
    <script>
        function dataValid() {
            var userNameInput = document.getElementById("userName");
            if (userNameInput.value == '') {
                alert("请输入用户名")
                return false;
            }
            var passwordInput = document.getElementById("password");
            if (passwordInput.value == '') {
                alert("请输入密码")
                return false;
            }
            return true;
        }
    </script>
</head>
<body>
<!-- 整个登录页面的容器div，id值为container，此值在整个页面必须唯一 -->
<div id="container">
    <!--表单标签form，页面只有包含了此标签才能向服务端提交数据-->
    <form onsubmit="return dataValid();" id="loginform" name="loginform" action="http://localhost:8080" method="get">
        <div id="loginwrapper">
            <div id="loginwindow">
                <div id="logininfo">
                    <h2>系统账户登录</h2>
                    <div id="usernamewrapper">
                        <label>账户名称</label>
                        <br/>
                        <input id="userName" name="userName" type="text"/>
                    </div>
                    <div id="passwordwrapper">
                        <label>输入密码</label>
                        <br/>
                        <input id="password" name="password" type="password"/>
                    </div>
                    <div id="btnwrapper">
                        <button>登录</button>
                    </div>
                    <div id="awrapper">
                        <a target="_blank" href="http://www.baidu.com/">注册用户</a>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
</body>
</html>
